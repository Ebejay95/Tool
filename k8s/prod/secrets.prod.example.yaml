# Production secrets example (DO NOT apply as-is)
# Copy to: k8s/prod/secrets.prod.yaml and fill in strong values.

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: cmc-prod
type: Opaque
stringData:
  password: "CHANGE_ME_STRONG_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: cmc-app-secret
  namespace: cmc-prod
type: Opaque
stringData:
  # In-cluster connection string
  connection: "Host=postgres;Port=5432;Database=cmc_prod;Username=cmc_user;Password=CHANGE_ME_STRONG_PASSWORD;Pooling=true;SslMode=Disable"
---
apiVersion: v1
kind: Secret
metadata:
  name: cmc-mail
  namespace: cmc-prod
type: Opaque
stringData:
  SMTP_HOST: "smtp.example.com"
  SMTP_PORT: "587"
  SMTP_USER: "user"
  SMTP_PASS: "pass"
  SMTP_FROM: "noreply@example.com"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: cmc-prod
type: Opaque
stringData:
  password: "CHANGE_ME_STRONG_REDIS_PASSWORD"
  connection: "redis:6379,password=CHANGE_ME_STRONG_REDIS_PASSWORD"
