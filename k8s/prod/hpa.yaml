apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cmc-app
  namespace: cmc-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cmc-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # 5 min abwarten bevor Scale-down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
---
# PodDisruptionBudget: Sicherstellt dass immer mind. 1 Pod verfügbar bleibt
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cmc-app
  namespace: cmc-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: cmc-app
