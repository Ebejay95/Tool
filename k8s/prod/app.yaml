apiVersion: apps/v1
kind: Deployment
metadata:
  name: cmc-app
  namespace: cmc-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cmc-app
  template:
    metadata:
      labels:
        app: cmc-app
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:15
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              value: postgres
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: cmc_prod
            - name: PGUSER
              value: cmc_user
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
          command: ["/bin/sh", "-lc"]
          args:
            - |
              set -euo pipefail
              echo "⏳ Waiting for Postgres readiness..."
              for i in $(seq 1 120); do
                if PGPASSWORD="$PGPASSWORD" pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" >/dev/null 2>&1; then
                  echo "✅ DB is ready"; exit 0
                fi
                echo "… still waiting ($i/120)"; sleep 2
              done
              echo "❌ DB not ready in time"; exit 1
      containers:
        - name: cmc-app
          image: ghcr.io/ebejay95/tool/cmc-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: cmc-mail
                optional: false
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: HTTPS_REDIRECT
              value: "true"
            # Migration wird via K8s Job (migrate-job.yaml) erledigt, nicht beim App-Start
            - name: MIGRATE_ON_STARTUP
              value: "false"
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: cmc-app-secret
                  key: connection
            - name: APP_PUBLIC_BASE_URL
              value: "https://cmc.example.com"
            - name: Redis__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: connection
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: cmc-app
  namespace: cmc-prod
spec:
  selector:
    app: cmc-app
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
