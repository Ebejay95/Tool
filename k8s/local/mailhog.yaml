# MailHog – lokaler SMTP-Catch-All-Server für Development
# SMTP:  Port 1025 (empfängt alle E-Mails, sendet NICHT weiter)
# WebUI: Port 8025 (zeigt empfangene E-Mails an)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailhog
  namespace: cmc-local
  labels:
    app: mailhog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailhog
  template:
    metadata:
      labels:
        app: mailhog
    spec:
      containers:
        - name: mailhog
          image: mailhog/mailhog:v1.0.1
          ports:
            - containerPort: 1025
              name: smtp
            - containerPort: 8025
              name: web
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mailhog
  namespace: cmc-local
spec:
  selector:
    app: mailhog
  ports:
    - name: smtp
      port: 1025
      targetPort: 1025
    - name: web
      port: 8025
      targetPort: 8025
