# Lokale Variante des Migrate-Jobs (kein Imagepull, IfNotPresent).
apiVersion: batch/v1
kind: Job
metadata:
  name: cmc-migrate
  namespace: cmc-local
  labels:
    app: cmc-migrate
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-postgres
          image: postgres:15
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              value: postgres
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: cmc_local
            - name: PGUSER
              value: cmc_user
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
          command: ["/bin/sh", "-lc"]
          args:
            - |
              set -euo pipefail
              echo "⏳ Waiting for Postgres readiness..."
              for i in $(seq 1 120); do
                if PGPASSWORD="$PGPASSWORD" pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" >/dev/null 2>&1; then
                  echo "✅ DB is ready"; exit 0
                fi
                echo "… still waiting ($i/120)"; sleep 2
              done
              echo "❌ DB not ready in time"; exit 1
      containers:
        - name: cmc-migrate
          image: cmc-web:local
          imagePullPolicy: IfNotPresent
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: MIGRATE_ON_STARTUP
              value: "true"
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: cmc-app-secret
                  key: connection
            - name: APP_PUBLIC_BASE_URL
              value: "http://localhost:8080"
          command: ["dotnet", "Api.dll", "--migrate-only"]
