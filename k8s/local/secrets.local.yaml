# Local-only secrets (Docker Desktop Kubernetes)
# Change passwords before sharing.

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: cmc-local
type: Opaque
stringData:
  password: "local_dev_password_change_me"
---
apiVersion: v1
kind: Secret
metadata:
  name: cmc-app-secret
  namespace: cmc-local
type: Opaque
stringData:
  connection: "Host=postgres;Port=5432;Database=cmc_local;Username=cmc_user;Password=local_dev_password_change_me;Pooling=true;SslMode=Disable"
---
apiVersion: v1
kind: Secret
metadata:
  name: master-user
  namespace: cmc-local
type: Opaque
stringData:
  email: "admin@example.com"
  password: "ChangeMe123!ChangeMe123!"
---
apiVersion: v1
kind: Secret
metadata:
  name: cmc-mail
  namespace: cmc-local
type: Opaque
stringData:
  SMTP_HOST: "localhost"
  SMTP_PORT: "25"
  SMTP_USER: ""
  SMTP_PASS: ""
  SMTP_FROM: "noreply@example.com"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: cmc-local
type: Opaque
stringData:
  password: "local_redis_password"
  connection: "redis:6379,password=local_redis_password"
