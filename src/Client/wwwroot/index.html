<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMC</title>
    <base href="/" />

    <!-- MudBlazor Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <!-- MudBlazor Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <!-- MudBlazor Styles -->
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />

    <link href="css/app.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Roboto, sans-serif;">
            <div style="text-align: center;">
                <p style="color: #0009BA; font-size: 1.2rem;">Loading...</p>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_content/MudBlazor/MudBlazor.min.js"></script>

    <!-- Cookie-Helper für ThemeService -->
    <script>
        window.cookieHelper = {
            get: function (name) {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(';').shift();
                return null;
            },
            set: function (name, value, days) {
                const expires = new Date();
                expires.setTime(expires.getTime() + (days * 24 * 60 * 60 * 1000));
                document.cookie = `${name}=${value};expires=${expires.toUTCString()};path=/`;
            }
        };
    </script>

    <!-- Import/Export: Browser-Datei-Download via Base64 -->
    <script>
        window.importExportHelpers = {
            downloadFile: function (fileName, contentType, base64Data) {
                try {
                    const byteChars = atob(base64Data);
                    const byteNums = new Array(byteChars.length);
                    for (let i = 0; i < byteChars.length; i++) byteNums[i] = byteChars.charCodeAt(i);
                    const blob = new Blob([new Uint8Array(byteNums)], { type: contentType });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fileName;
                    a.style.display = 'none';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    // Kurz warten bevor Blob-URL freigegeben wird
                    setTimeout(() => URL.revokeObjectURL(url), 10000);
                } catch (e) {
                    console.error('[importExportHelpers] Download fehlgeschlagen:', e);
                }
            }
        };
    </script>

    <!-- Easter Egg: Ctrl/Cmd+Shift+S → rollender Smiley -->
    <script>
        window.easterEggHelper = {
            register: function (dotnetRef) {
                window.addEventListener('keydown', function (e) {
                    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                        e.preventDefault();
                        dotnetRef.invokeMethodAsync('TriggerEasterEgg');
                    }
                });
            }
        };
    </script>

    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
